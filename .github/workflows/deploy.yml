name: Deploy Connettore WooCommerce

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/nextfuture-it/evordersconnector
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # 1) Qualità: test + lint. Blocca il deploy se rossi.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Pint (code style)
        run: vendor/bin/pint --test

      - name: PHPUnit
        run: vendor/bin/phpunit

  # 2) Build immagine e push su GHCR
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  # 3) Deploy sul VPS: i segreti vengono iniettati QUI dai GitHub Secrets, mai dal codice
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          PORT: ${{ vars.PORT }}
          APP_URL: ${{ vars.APP_URL }}
          APP_KEY: ${{ secrets.APP_KEY }}
          # WooCommerce REST API multi-store (sola lettura ordini).
          # WC_STORES = CSV degli slug. Default globali = variabili.
          WC_STORES: ${{ vars.WC_STORES }}
          WC_DEFAULT_STORE: ${{ vars.WC_DEFAULT_STORE }}
          WC_API_VERSION: ${{ vars.WC_API_VERSION }}
          WC_TIMEOUT: ${{ vars.WC_TIMEOUT }}
          # Per ogni slug: URL = variabile, KEY/SECRET = secret. Replica il blocco per store.
          WC_NEGOZIO1_URL: ${{ vars.WC_NEGOZIO1_URL }}
          WC_NEGOZIO1_KEY: ${{ secrets.WC_NEGOZIO1_KEY }}
          WC_NEGOZIO1_SECRET: ${{ secrets.WC_NEGOZIO1_SECRET }}
          WC_NEGOZIO2_URL: ${{ vars.WC_NEGOZIO2_URL }}
          WC_NEGOZIO2_KEY: ${{ secrets.WC_NEGOZIO2_KEY }}
          WC_NEGOZIO2_SECRET: ${{ secrets.WC_NEGOZIO2_SECRET }}
          # Sicurezza accesso
          CONNETTORE_IP_WHITELIST: ${{ vars.CONNETTORE_IP_WHITELIST }}
        with:
          envs: PORT,APP_URL,APP_KEY,WC_STORES,WC_DEFAULT_STORE,WC_API_VERSION,WC_TIMEOUT,WC_NEGOZIO1_URL,WC_NEGOZIO1_KEY,WC_NEGOZIO1_SECRET,WC_NEGOZIO2_URL,WC_NEGOZIO2_KEY,WC_NEGOZIO2_SECRET,CONNETTORE_IP_WHITELIST
          host: ${{ secrets.HOST_WEB }}
          username: ${{ secrets.SSH_KEY_USER }}
          key: ${{ secrets.SSH_KEY_DEPLOY }}
          script: |
            set -e
            IMAGE="ghcr.io/nextfuture-it/evordersconnector:latest"

            echo "${{ secrets.CONTAINERS_PAT }}" | docker login ghcr.io -u nextfuture-it --password-stdin
            docker pull $IMAGE

            docker stop evordersconnector 2>/dev/null || true
            docker rm evordersconnector 2>/dev/null || true

            # Bind su 127.0.0.1: raggiungibile solo dal reverse-proxy (nginx) che termina TLS.
            # Volume 'evordersconnector_data': store SQLite (solo audit) persistente tra i redeploy.
            # Nessun --add-host: il servizio parla solo con WooCommerce via HTTPS, non con DB sull'host.
            docker run -d \
              --name evordersconnector \
              --restart unless-stopped \
              -p 127.0.0.1:$PORT:8000 \
              -v evordersconnector_data:/app/storage/db \
              -e APP_NAME="Connettore WooCommerce" \
              -e APP_ENV=production \
              -e "APP_KEY=${APP_KEY}" \
              -e APP_DEBUG=false \
              -e "APP_URL=${APP_URL}" \
              -e DB_CONNECTION=sqlite \
              -e DB_DATABASE=/app/storage/db/database.sqlite \
              -e "WC_STORES=${WC_STORES}" \
              -e "WC_DEFAULT_STORE=${WC_DEFAULT_STORE}" \
              -e "WC_API_VERSION=${WC_API_VERSION:-wc/v3}" \
              -e "WC_TIMEOUT=${WC_TIMEOUT:-15}" \
              -e "WC_NEGOZIO1_URL=${WC_NEGOZIO1_URL}" \
              -e "WC_NEGOZIO1_KEY=${WC_NEGOZIO1_KEY}" \
              -e "WC_NEGOZIO1_SECRET=${WC_NEGOZIO1_SECRET}" \
              -e "WC_NEGOZIO2_URL=${WC_NEGOZIO2_URL}" \
              -e "WC_NEGOZIO2_KEY=${WC_NEGOZIO2_KEY}" \
              -e "WC_NEGOZIO2_SECRET=${WC_NEGOZIO2_SECRET}" \
              -e "CONNETTORE_IP_WHITELIST=${CONNETTORE_IP_WHITELIST}" \
              -e SESSION_DRIVER=file \
              -e CACHE_STORE=file \
              -e QUEUE_CONNECTION=sync \
              $IMAGE

            # Store SQLite (solo audit) sul volume + migrazioni idempotenti.
            docker exec evordersconnector sh -c 'mkdir -p /app/storage/db && touch /app/storage/db/database.sqlite'
            docker exec evordersconnector php artisan migrate --force
            docker exec evordersconnector php artisan config:cache

            # Doc API (Scribe): rigenera con APP_URL/title di produzione (no response-call live).
            docker exec evordersconnector php artisan scribe:generate

            # Healthcheck
            echo "Attesa avvio container..."
            sleep 5
            for i in 1 2 3 4 5; do
              if docker exec evordersconnector wget -qO- --timeout=3 http://127.0.0.1:8000/api/v1/health 2>/dev/null; then
                echo ""; echo "✓ evordersconnector healthy"; break
              fi
              if [ $i -eq 5 ]; then
                echo "✗ evordersconnector non risponde dopo 5 tentativi"
                docker logs evordersconnector --tail 30
                exit 1
              fi
              sleep 3
            done

            # Pulizia immagini vecchie (solo di questo progetto)
            docker image prune -f --filter "label=org.opencontainers.image.source=https://github.com/Nextfuture-IT/EVOrdersConnector"
